<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <title>KabuRadar 解析結果</title>
  <link rel="stylesheet" href="assets/style.css" />
</head>
<body>
  <header class="header">
    <h1>KabuRadar</h1>
    <p class="subtitle">スクリーニング結果（LO）</p>
    <p id="updated" class="updated">読み込み中…</p>
  </header>

  <main class="main">
    <section id="summary" class="summary" aria-label="サマリー"></section>

    <div class="toolbar">
      <input id="search" type="search" placeholder="銘柄コード・名称で検索" autocomplete="off" />
      <select id="sort" aria-label="並び替え">
        <option value="incomes-desc">損益（高い順）</option>
        <option value="incomes-asc">損益（低い順）</option>
        <option value="pf-desc">PF（高い順）</option>
        <option value="code-asc">コード順</option>
      </select>
    </div>

    <p id="count" class="count"></p>
    <ul id="list" class="list"></ul>
    <p id="error" class="error" hidden></p>
  </main>

  <footer class="footer">
    <small>バックテスト集計 · GitHub Pages</small>
  </footer>

  <script src="assets/app.js"></script>
</body>
</html>
