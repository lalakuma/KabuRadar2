name: CI

on:
  push:
    branches: [master]
    paths:
      - "src/**"
      - "tests/**"
      - "config/**"
      - "requirements.txt"
      - "pytest.ini"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "src/**"
      - "tests/**"
      - "config/**"
      - "requirements.txt"
      - "pytest.ini"
      - ".github/workflows/ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest -q

      - name: Verify shell launchers
        run: test -x sh/_env.sh || test -f sh/screening.sh
