name: Daily screening schedule guard

on:
  schedule:
    # 各スロット直後 + 遅延追随用（JST）
    - cron: "5 1 * * 1-5"    # 10:05（場中 LO）
    - cron: "5 7 * * 1-5"    # 16:05（引け後 LO）
    - cron: "35 8 * * 1-5"   # 17:35
    - cron: "5 9 * * 1-5"    # 18:05
    # 上記以外の取りこぼし追随（UTC 01:00-09:59 = JST 10:00-18:59）
    - cron: "*/5 1-9 * * 1-5"
  workflow_dispatch:

permissions:
  actions: write
  contents: read

concurrency:
  group: schedule-guard
  cancel-in-progress: false

jobs:
  dispatch-daily-screening:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch missing slot
        uses: actions/github-script@v7
        with:
          script: |
            const slots = [
              { name: "10:00", profile: "lo", minuteOfDay: 10 * 60, coverStart: 9 * 60 + 55, coverEnd: 15 * 60 + 54 },
              { name: "16:00", profile: "lo", minuteOfDay: 16 * 60, coverStart: 15 * 60 + 55, coverEnd: 19 * 60 },
            ];
            const checkDelayMinutes = 5;
            const dispatchEndMinute = 19 * 60;

            const nowUtcMs = Date.now();
            const jstMs = nowUtcMs + 9 * 60 * 60 * 1000;
            const nowJst = new Date(jstMs);
            const todayJst = nowJst.toISOString().slice(0, 10);
            const nowMinuteOfDay = nowJst.getUTCHours() * 60 + nowJst.getUTCMinutes();

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const workflowId = "daily-screening.yml";
            const runs = await github.paginate(github.rest.actions.listWorkflowRuns, {
              owner,
              repo,
              workflow_id: workflowId,
              branch: "master",
              per_page: 100,
            });

            const runMinutesToday = runs
              .map((run) => {
                const runJst = new Date(new Date(run.created_at).getTime() + 9 * 60 * 60 * 1000);
                return {
                  runId: run.id,
                  event: run.event,
                  date: runJst.toISOString().slice(0, 10),
                  minuteOfDay: runJst.getUTCHours() * 60 + runJst.getUTCMinutes(),
                };
              })
              .filter((x) => x.date === todayJst);

            core.info(
              `JST now=${nowJst.toISOString()} minuteOfDay=${nowMinuteOfDay} runsToday=${runMinutesToday.length}`,
            );

            if (nowMinuteOfDay > dispatchEndMinute) {
              core.info("Outside dispatch window (after 19:00 JST).");
              return;
            }

            for (const slot of slots) {
              const openMinute = slot.minuteOfDay + checkDelayMinutes;
              if (nowMinuteOfDay < openMinute) {
                continue;
              }

              const alreadyRun = runMinutesToday.some(
                (r) => r.minuteOfDay >= slot.coverStart && r.minuteOfDay <= slot.coverEnd,
              );
              if (alreadyRun) {
                core.info(`slot ${slot.name} already covered, skip.`);
                continue;
              }

              core.notice(`Dispatching daily-screening for missing slot ${slot.name} (${slot.profile}).`);
              await github.rest.actions.createWorkflowDispatch({
                owner,
                repo,
                workflow_id: workflowId,
                ref: "master",
                inputs: {
                  job: "full",
                  config_profile: slot.profile,
                },
              });
              return;
            }

            core.info("No missing slot detected.");
