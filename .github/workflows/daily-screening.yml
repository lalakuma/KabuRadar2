name: Daily screening (cloud)

on:
  schedule:
    # 平日 15:00 JST (UTC+9) = 06:00 UTC
    - cron: "0 6 * * 1-5"
    # 平日 16:00 JST (UTC+9) = 07:00 UTC
    - cron: "0 7 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-screening
  cancel-in-progress: false

jobs:
  screening:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout (with LFS)
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify database
        run: test -f data/kaburadar.db

      - name: Update prices (1 day)
        env:
          PYTHONPATH: src
        run: python src/kaburadar/cli/update_prices.py --menu 1

      - name: Analyze all symbols
        env:
          PYTHONPATH: src
        run: python src/kaburadar/cli/analyze.py

      - name: Build GitHub Pages JSON
        env:
          PYTHONPATH: src
          TZ: Asia/Tokyo
          KABURADAR_REFRESH_TIMESTAMP: "1"
        run: python src/kaburadar/cli/publish.py

      - name: Deploy GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          publish_branch: gh-pages
          force_orphan: true

      - name: LINE notify (optional)
        if: success()
        env:
          PYTHONPATH: src
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_IDS: ${{ secrets.LINE_USER_IDS }}
        run: |
          if [ -n "$LINE_CHANNEL_ACCESS_TOKEN" ] && [ -n "$LINE_USER_IDS" ]; then
            python -c "from kaburadar.notifications.line import notify_analysis_summary; notify_analysis_summary()"
          else
            echo "LINE secrets not set, skipping."
          fi

      - name: Commit results
        env:
          PYTHONPATH: src
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/kaburadar.db docs/data.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          BRANCH=$(python -c "import sys; sys.path.insert(0,'src'); from kaburadar.settings.git_publish import resolve_publish_branch; print(resolve_publish_branch())")
          git commit -m "クラウド解析結果を更新 (Actions)"
          git push origin "HEAD:${BRANCH}"
