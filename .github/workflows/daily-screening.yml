name: Daily screening (cloud)

on:
  schedule:
    # 平日 12:30 JST (UTC+9) = 03:30 UTC（LO・場中・午後場）
    - cron: "30 3 * * 1-5"
    # 平日 16:00 JST (UTC+9) = 07:00 UTC（LO・引け後）
    - cron: "0 7 * * 1-5"
  workflow_dispatch:
    inputs:
      job:
        description: "実行範囲"
        required: true
        default: full
        type: choice
        options:
          - full
          - analyze
          - publish
      config_profile:
        description: "設定 (lo/hi)"
        required: true
        default: lo
        type: choice
        options:
          - lo
          - hi

permissions:
  contents: write

concurrency:
  group: daily-screening
  cancel-in-progress: false

jobs:
  screening:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout (with LFS)
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify database
        run: test -f data/kaburadar.db

      - name: Log schedule timing (verification)
        if: github.event_name == 'schedule'
        env:
          TZ: Asia/Tokyo
        run: |
          echo "=== schedule verification ==="
          echo "github.event.schedule=${{ github.event.schedule }}"
          echo "run_started_jst=$(date '+%Y-%m-%d %H:%M:%S %Z')"
          echo "run_started_utc=$(date -u '+%Y-%m-%d %H:%M:%S UTC')"

      - name: Select screening config
        run: |
          JOB="${{ github.event.inputs.job }}"
          if [ -z "$JOB" ]; then JOB="full"; fi
          echo "KABURADAR_JOB=$JOB" >> "$GITHUB_ENV"
          PROFILE="${{ github.event.inputs.config_profile }}"
          if [ -z "$PROFILE" ]; then PROFILE="lo"; fi
          if [ "$PROFILE" = "hi" ]; then
            echo "KABURADAR_CONFIG=config/config_hi.ini" >> "$GITHUB_ENV"
            echo "Using config_hi.ini (RSI4反転=1)"
          else
            echo "KABURADAR_CONFIG=config/config_lo.ini" >> "$GITHUB_ENV"
            echo "Using config_lo.ini (RSI4反転=0)"
          fi

      - name: Update prices (5 days)
        if: env.KABURADAR_JOB == 'full'
        env:
          PYTHONPATH: src
        run: python src/kaburadar/cli/update_prices.py --menu 6

      - name: Analyze all symbols
        if: env.KABURADAR_JOB == 'full' || env.KABURADAR_JOB == 'analyze'
        env:
          PYTHONPATH: src
          KABURADAR_CONFIG: ${{ env.KABURADAR_CONFIG }}
        run: python src/kaburadar/cli/analyze.py

      - name: Build GitHub Pages JSON
        if: env.KABURADAR_JOB == 'full' || env.KABURADAR_JOB == 'publish'
        env:
          PYTHONPATH: src
          TZ: Asia/Tokyo
          KABURADAR_REFRESH_TIMESTAMP: "1"
          KABURADAR_CONFIG: ${{ env.KABURADAR_CONFIG }}
          KABURADAR_PAGES_URL: https://lalakuma.github.io/KabuRadar2
        run: python src/kaburadar/cli/publish.py

      - name: Deploy GitHub Pages
        if: env.KABURADAR_JOB == 'full' || env.KABURADAR_JOB == 'publish'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          publish_branch: gh-pages
          force_orphan: true

      - name: LINE notify (optional)
        if: success() && (env.KABURADAR_JOB == 'full' || env.KABURADAR_JOB == 'publish')
        continue-on-error: true
        env:
          PYTHONPATH: src
          TZ: Asia/Tokyo
          KABURADAR_CONFIG: ${{ env.KABURADAR_CONFIG }}
          KABURADAR_PAGES_URL: https://lalakuma.github.io/KabuRadar2
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_IDS: ${{ secrets.LINE_USER_IDS }}
        run: |
          if [ -n "$LINE_CHANNEL_ACCESS_TOKEN" ] && [ -n "$LINE_USER_IDS" ]; then
            python src/kaburadar/cli/notify_line.py
          else
            echo "LINE secrets not set, skipping."
          fi

      - name: Commit results
        env:
          PYTHONPATH: src
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/kaburadar.db data/special_state.json docs/data.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          BRANCH=$(python -c "import sys; sys.path.insert(0,'src'); from kaburadar.settings.git_publish import resolve_publish_branch; print(resolve_publish_branch())")
          git commit -m "クラウド解析結果を更新 (Actions)"
          git push origin "HEAD:${BRANCH}"
